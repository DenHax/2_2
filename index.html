<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Обзоры фильмов Онлайн</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="registerModal" class="modal">
    <div class="modal-content">
      <span class="close" id="closeRegister">&times;</span>
      <div class="auth-context">
        <b class="context-main">Регистрация</b>
        <b class="context-sub"><a href="#" id="toLogin">Авторизация</a></b>
      </div>
      <form id="registerForm">
        <div class="form-inputs">
          <div class="auth-input">
            <input type="text" id="registerUsername" placeholder=" " required>
            <label for="registerUsername">Имя</label>
          </div>
          <div class="custom-form-container">
            <div class="auth-input">
              <input type="text" id="registeEmail" placeholder=" " required>
              <label for="registeEmail">Email</label>
            </div>
            <div class="auth-input">
              <input type="text" id="registerPhone" placeholder=" " required>
              <label for="registerPhone">Телефон</label>
            </div>
            <div class="auth-input">
              <input type="password" id="registerPassword" placeholder=" " required>
              <label for="registerPassword">Пароль</label>
            </div>
            <div class="auth-input">
              <input type="password" id="registerRetypePassword" placeholder=" " required>
              <label for="registerRetypePassword">Повторите пароль</label>
            </div>
          </div>
        </div>
        <label class="data-proc-box">
          <input type="checkbox" id="dataProcessingConsent" required> Я согласен на обработку персональных данных
        </label>
        <button type="submit">Зарегистрироваться</button>
      </form>
    </div>
  </div>

  <div id="loginModal" class="modal">
    <div class="modal-content">
      <span class="close" id="closeLogin">&times;</span>
      <div class="auth-context">
        <b class="context-sub"><a href="#" id="toRegister">Регистрация</a></b>
        <b class="context-main">Авторизация</b>
      </div>
      <form id="loginForm">
        <div class="form-inputs">
          <div class="auth-input">
            <input type="text" id="loginUsername" placeholder=" " required>
            <label for="loginUsername">Логин</label>
          </div>

          <div class="auth-input">
            <input type="password" id="loginPassword" placeholder=" " required>
            <label for="loginPassword">Пароль</label>
          </div>
        </div>
        <button type="submit">Войти</button>
      </form>
    </div>
  </div>

  <header>
    <div class="logo-container">
      <div class="logo-img">
        <img src="assets/Rectangle.svg" />
      </div>
      <p>Сайт с обзорами фильмов</p>
    </div>
    <div class="auth-container">
      <button id="register-btn">Регистрация</button>
      <button id="login-btn">Вход</button>
    </div>


  </header>

  <main>
    <div class="nav-container">
      <h2>Топ 20 фильмов</h2>
      <button class="add-review-btn"><span class="plus-sym">+</span> Добавить обзор</button>
    </div>
    <div class="films-review-container">
      <div class="film-review">
        <img src="assets/mile.png" />
        <div class="review-text-container">
          <h3>Зеленая миля (1999)</h3>
          <p class="review-date">Добавлено 15 августа</p>
        </div>
        <div class="review-more-btn">
          <p>Подробнее</p>
        </div>
      </div>

      <div class="film-review">
        <img src="assets/shindler.png" />
        <div class="review-text-container">
          <h3>Список Шиндлера (1993)</h3>
          <p class="review-date">Добавлено 15 августа</p>
        </div>
        <div class="review-more-btn">
          <p>Подробнее</p>
        </div>
      </div>
    </div>
    <div class="show-more">
      <img src="assets/show-more.svg" />
      <p>Посмотреть еще</p>
    </div>
  </main>

  <footer>
    <a>info@gmail.com</a>
    <p>Информация о разработчике</p>
  </footer>

  <script src="script.js"></script>
</body>

</html>
